apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-commissioning-handler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:

        # MAIN SECURE CONTAINER
        - name: profilinghandler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080

        # HELM-INJECTED DATADOG CONTAINER
        {{- if .Values.datadog.enabled }}
        {{ include "datadog.sidecar" . | indent 8 }}
        {{- end }}
